<div class="automation-scenarios">
  <header class="automation-header justify-content-between">
    <div class="d-flex align-items-center">
      <img src="$siteroot$apphome/theme/images/emedialogo.png" alt="eMedia Logo" />
      <h2>[[Enabled Scenarios]]</h2>
    </div>

    <div class="d-flex align-items-center">
      <button class="btn btn-accent me-3 45deg" id="importScenario">
        [[Import]]
        <i class="bi bi-download deg-90 ms-1"></i>
      </button>
      <input type="file" id="importScenarioFile" style="display:none;position:absolute;right:-9999px;" accept=".json,application/json">
      <a class="btn btn-cta emdialog" href="$applink/components/smartautomation/scenario-form.html" data-hidefooter="true">
        <i class="bi bi-plus-lg me-1"></i>
        [[Create New Scenario]]
      </a>
    </div>
  </header>
  <div class="p-2">
    <div class="automation-list row row-cols-2 row-cols-md-3 g-2">
      #foreach($scenario in $scenarios)
      <div class="col">
        <div class="card">
          <h5 class="card-title">$scenario.name</h5>
          <div class="card-body">
            <img src="/${mediadbappid}/views/automations/${scenario.id}.png" class="card-img-top p-1" alt="$scenario.name Thumbnail">
            <p class="card-text">$!scenario.longdescription</p>
            <div class="active-automation">
              <span>TranslationAgent</span>
            </div>
            <div class="actions">
              <a class="btn btn-primary btn-sm edit-btn ajax" data-scenarioid="$scenario.id" href="$applink/components/smartautomation/editor.html" data-targetdivinner="smartautomation" data-oemaxlevel="1">
                <i class="bi bi-pencil-square"></i>
              </a>
              <a class="btn btn-danger btn-sm delete-btn ajax" href="$applink/components/smartautomation/scenario-delete.html?id=${scenario.id}&searchtype=automationscenario" data-confirm="[[Are you sure you want to delete this scenario?]]"  data-targetdivinner="smartautomation" data-oemaxlevel="1">
                <i class="bi bi-trash"></i>
              </a>
            </div>
          </div>
        </div>
      </div>
      #end
    </div>
  </div>
</div>
