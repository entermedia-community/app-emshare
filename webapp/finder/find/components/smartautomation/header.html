<div id="smartheader" class="org-header">
  <div class="d-flex align-items-center me-2" style="min-width:300px">
    #set( $id = $context.getRequestParameter("id"))
	#ifnotnull($id)
    	#set( $current = $mediaarchive.getData("smartautomation",$id) )
    #end	
    #ifnull($current)
      #set( $current = $mediaarchive.query("smartautomation").exact("iscurrent","true").searchOne($context) )
    #end

    <img src="$siteroot$apphome/theme/images/emedialogo.png" alt="eMedia Logo" />
    <h1>[[Agent Automation]]</h1>
  </div> 

  <div class="d-flex align-items-center justify-content-between flex-grow-1">
    <div class="d-flex align-items-center">
      <!-- <a 
        class="btn template-versions px-3 emdialog saved-versions" 
        title="Saved Template Versions"
        href="$siteroot$apphome/components/smartautomation/versions.html" 
        role="button"
        data-dialogid="templateVersions"
        data-oemaxlevel="1"
        aria-haspopup="true" 
        aria-expanded="false">
        <i class="bi bi-clock-history me-2"></i> [[Saved Versions]]
      </a>
      <input type="hidden" id="automationId" name="id" value="$!current.getId()"/>
      <input type="hidden" class="form-control px-3" id="automationName" name="name" value="$!current.getName()" placeholder="[[Template Name]]" />
      <button class="btn btn-brand px-3" id="saveOrganizer">
        <i class="fas fa-save"></i>
        <i class="fas fa-check"></i>
        <i class="fas fa-spinner fa-spin"></i>
        <span></span>
      </button> -->
      <!-- <button class="btn btn-outline-secondary  ms-2" id="copySmartNodes">
        <i class="bi bi-copy"></i>
      </button>
      <button class="btn btn-outline-secondary  ms-2" id="pasteSmartNodes">
        <i class="bi bi-clipboard"></i>
      </button> -->
    </div>
    <div class="d-flex align-items-center">
      <button class="btn btn-outline-secondary ms-4 45deg" id="importSmartNodes">
        [[Import]]
        <i class="bi bi-download deg-90 ms-1"></i>
      </button>
      <button class="btn btn-outline-secondary ms-3" id="exportSmartNodes">
        [[Export]] <i class="bi bi-upload deg-90 ms-1"></i>
      </button>
      <input type="file" id="importSmartNodesFile" style="display:none;position:absolute;right:-9999px;" accept=".zip,application/zip,application/x-zip,application/x-zip-compressed">
      <a 
      class="btn btn-brand emdialog deploy-automation ms-4" 
      title="Run Automation"
      href="$siteroot$apphome/components/smartautomation/deploy.html" 
      role="button" 
      data-dialogid="deployOrganizer"
      data-dialogwidth="500"
      data-oemaxlevel="1"
      style="min-width: 120px;"
      >
        <i class="bi bi-play-fill" style="font-size: 1.2rem;"></i>
        <span class="ms-2" style="font-size: 1.1rem;">
          Run
        </span>
      </a>

      <button id="closeorgnizer" class="ms-2 btn closeorgnizer" title="Close Dialog">
        <i class="bi bi-x-lg"></i>
      </button>
    </div> 
  </div>
</div>
