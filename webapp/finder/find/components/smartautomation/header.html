<div class="automation-header">
  <div class="d-flex align-items-center me-2" style="min-width:300px">
    <a class="ajax px-2" href="$applink/components/smartautomation/index.html" data-targetdivinner="smartautomation" data-oemaxlevel="1">
      <i class="fas fa-arrow-left me-2"></i>
      <img src="$siteroot$apphome/theme/images/emedialogo.png" alt="eMedia Logo" />
    </a>
    <div class="d-flex flex-column">
      <div class="d-flex align-items-center">
        <h2 class="my-0 me-2">#text($scenario)</h2>
        <a href="$applink/components/smartautomation/scenario-form.html?scenarioid=$!scenario.id" data-hidefooter="true" class="emdialog edit-scenario">
          <i class="bi bi-pencil-fill ns"></i>
        </a>
      </div>
      <p class="m-0 scenario-description">$!scenario.longdescription</p>
    </div> 
  </div> 

  <div class="d-flex align-items-center justify-content-end flex-grow-1">
    <div class="d-flex align-items-center">
      <input type="hidden" id="automationId" name="id" value="$!scenario.getId()" />
      <button class="btn btn-outline-secondary ms-3" id="exportScenario" data-name="#text($scenario)">
        [[Export]] <i class="bi bi-upload deg-90 ms-1"></i>
      </button>
      <a class="btn btn-primary ms-3" id="saveScenarioLayout" 
        title="[[Save Layout]]"
        href="$siteroot$apphome/components/smartautomation/save-layout.html"
        role="button">
        [[Save Layout]]
      </a>

      <button id="closeautomation" class="ms-2 btn closeautomation" title="Close Dialog">
        <i class="bi bi-x-lg"></i>
      </button>
    </div> 
  </div>
</div>
