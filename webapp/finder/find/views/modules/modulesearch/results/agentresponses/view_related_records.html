<div class="d-flex flex-column flex-grow-1">
  <h5 class="my-2">[[Related Records]]:</h5>
  <ul>
    #foreach($recordmodule in $relatedrecords)
      <li>
        <a class="ajax"
          href="$applink/views/modules/${agentcontext.entitymoduleid}/editors/entitychat/toplevelfunctionsave.html"
          data-targetdiv="aichatsearch"
          data-channel="$!{channel.getId()}"
          data-toplevelaifunctionid="search_welcome"
          data-functionname="view_related_record_list"
          data-context_relatedmoduleid="$recordmodule.moduleid"
          data-oemaxlevel="1">
          <span>$recordmodule.name ($recordmodule.total)</span>
        </a>
      </li>
    #end
  </ul>
</div>
