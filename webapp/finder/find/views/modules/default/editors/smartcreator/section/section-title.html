<div class="creator-section-title #if($foreach.count == 1) active #end" data-target="#section-${section.id}">
  #set($role = $mediaarchive.getCachedData("contentrole", $section.contentrole))
  <a class="emdialog contentrole-btn"
    href="$edithome/section/contentrole.html"
    data-id="$section.id"
    data-searchtype="componentsection"
    data-dialogid="contentrole"
    data-hidefooter="true"
    data-modalsize="sm"
    data-playbackentityid="${section.playbackentityid}"
    data-playbackentitymoduleid="${section.playbackentitymoduleid}"
    title="[[Content Role]]">
    #ifnotnull($role)
      $role
    #end
    #ifnull($role)
      <i class="me-1 bi bi-plus-lg"></i> [[Set role]]
    #end
  </a>
  <div class="section-editable">
    <span>${section.name}</span>
    <a class="section-edit">
      <i class="fas fa-pen"></i>
    </a>
  </div>
  <input type="hidden" name="sectionid" value="${section.id}" />
  <textarea class="form-input">${section.name}</textarea>
  <div class="d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center">
      <a class="btn btn-sm text-success section-rename ms-1"
        href="$edithome/section/create-section.html"
        data-playbackentityid="${playbackentity.id}"
        data-playbackentitymoduleid="${playbackentitymodule.id}"
        data-sectionid="${section.id}">
        <i class="fas fa-save"></i>
      </a>
      <a class="btn btn-sm text-danger section-cancel ms-1">
        <i class="fas fa-times"></i>
      </a>
    </div>
  </div>
</div>
