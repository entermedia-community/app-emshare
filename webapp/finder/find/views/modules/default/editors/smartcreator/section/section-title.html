<div class="creator-section-title #if($count == 1) active #end" data-target="#section-${section.id}">
  <div class="section-editable">
    <span>${section.name}</span>
    <a class="section-edit">
      <i class="fas fa-pen"></i>
    </a>
  </div>
  <input type="hidden" name="sectionid" value="${section.id}" />
  <textarea class="form-input">${section.name}</textarea>
  <div class="d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center">
      <a class="btn btn-sm text-success section-rename ms-1"
        href="$edithome/section/create-section.html"
        data-playbackentityid="${playbackentity.id}"
        data-playbackentitymoduleid="${playbackentitymodule.id}"
        data-sectionid="${section.id}">
        <i class="fas fa-save"></i>
      </a>
      <a class="btn btn-sm text-danger section-cancel ms-1">
        <i class="fas fa-times"></i>
      </a>
    </div>
  </div>
</div>
