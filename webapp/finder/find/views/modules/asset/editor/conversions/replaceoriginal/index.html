<div class="mb-2">
[[Replace file]]: <strong>$asset.getName()</strong>
</div>
<form id="uploadform" 
	class="ajaxform autocloseform" 
	data-ajaxreloadtargets="mainmediacontainer"
	data-targetdiv="tabsummarypanel" 
	method="post" enctype="multipart/form-data" 
	action="${apphome}/views/modules/asset/editor/conversions/replaceoriginal/replace.html"
	data-toastmessage="[[Replacing original file]]"
	data-toastsuccess="[[Asset replaced successfully]]"
	data-toasterror="[[Failed to replace original file]]">
		<span class="btn btn-sm btn-cta btn-file">
		    [[Select File]] <input type="file" name="file.0" id="file0-file" onchange='$("#file0-file-info").html($(this).val());'>
		</span>
		<span id="file0-file-info" style="font-size:90%"></span>
		##[[Replace Image]]:<input type="file" size="50" name="file.0">
		<input type="hidden" name="unzip" value="false" />
		<input type="hidden" name="sourcepath" value="$!context.getRequestParameter('assetid')" />
		<input type="hidden" name="assetid" value="$!context.getRequestParameter('assetid')" />
		<input type="hidden" name="presetid" value="$!context.getRequestParameter('presetid')" />
		
	</form>
